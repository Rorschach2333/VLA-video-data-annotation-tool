<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>VLA Video Annotation Tool</title>
    <link rel="stylesheet" href="/static/styles.css?v=24" />
  </head>
  <body>
    <aside class="sidebar">
      <div class="field">
        <label data-i18n="language">界面语言</label>
        <select id="languageSelect">
          <option value="zh">中文</option>
          <option value="en">English</option>
        </select>
      </div>
      <div class="field">
        <label data-i18n="datasetLocation">数据集位置</label>
        <input id="videoRoot" type="text" />
      </div>
      <div class="field">
        <label data-i18n="outputDir">Result 输出目录</label>
        <input id="outputRoot" type="text" />
      </div>
      <div class="field">
        <label>GPU</label>
        <select id="gpuSelect"></select>
      </div>
      <div class="field">
        <label data-i18n="modelBackend">模型后端</label>
        <select id="modelBackend">
          <option value="sam21">SAM2.1</option>
          <option value="sam31">SAM3.1</option>
        </select>
      </div>
      <div class="field">
        <label>Checkpoint</label>
        <input id="checkpointPath" type="text" />
      </div>
      <div class="actions compact">
        <button id="refreshDataset" data-i18n="refreshDataset">刷新数据集</button>
      </div>
      <div class="field">
        <label>Episode</label>
        <select id="episodeSelect"></select>
        <div id="episodeAnnotationStatus" class="episode-status"></div>
      </div>
      <div class="field batch-field">
        <label data-i18n="taskQueue">后台任务列表</label>
        <input id="queueGpuIds" type="text" value="" data-i18n-placeholder="queueGpuPlaceholder" placeholder="GPU 编号，如 0,1,2；留空使用上方 GPU" />
        <div class="actions compact queue-actions">
          <button id="clearFinishedQueue" data-i18n="clearFinished">清理完成项</button>
        </div>
        <div class="check-row">
          <label><input class="queue-view" type="checkbox" value="head" checked /> head</label>
          <label><input class="queue-view" type="checkbox" value="left" checked /> left</label>
          <label><input class="queue-view" type="checkbox" value="right" checked /> right</label>
        </div>
        <div class="check-row">
          <label><input class="empty-view" type="checkbox" value="head" /> <span data-i18n="headEmpty">head 空</span></label>
          <label><input class="empty-view" type="checkbox" value="left" /> <span data-i18n="leftEmpty">left 空</span></label>
          <label><input class="empty-view" type="checkbox" value="right" /> <span data-i18n="rightEmpty">right 空</span></label>
        </div>
        <label class="inline-check"><input id="queueOverwrite" type="checkbox" checked /> <span data-i18n="overwriteExisting">覆盖已有结果</span></label>
      </div>
      <div class="field">
        <label data-i18n="labels">标注类别</label>
        <div id="labelList" class="label-list"></div>
      </div>
      <div class="field">
        <label data-i18n="promptMode">自动标注方式</label>
        <div class="segmented">
          <button class="prompt-mode active" data-mode="point">Point/Box</button>
          <button class="prompt-mode" data-mode="text">Text</button>
        </div>
      </div>
      <div class="field">
        <label data-i18n="brushSize">画笔大小</label>
        <input id="brushSize" type="range" min="4" max="80" value="24" />
      </div>
      <div class="actions">
        <button id="previewAll" data-i18n="previewAll">预览起始帧</button>
        <button id="runAll" data-i18n="runAll">提交三视角任务</button>
        <button id="saveManual" data-i18n="saveManual">保存手动调整</button>
        <button id="releaseModel" data-i18n="releaseModel">释放模型显存</button>
      </div>
      <div id="status" class="status"></div>
      <div id="paths" class="paths"></div>
      <div class="field">
        <label data-i18n="queueStatus">队列状态</label>
        <div id="queueStatus" class="batch-status"></div>
      </div>
      <div class="field">
        <label>Server timeline</label>
        <div id="promptTimeline" class="prompt-timeline"></div>
      </div>
    </aside>

    <main class="workspace">
      <section class="workspace-section">
        <header class="section-header">
          <h1>Raw</h1>
        </header>
        <div class="view-grid" id="viewGrid"></div>
      </section>
      <section class="annotation-toolbar">
        <div class="toolbar-group episode-toolbar-group">
          <label>Episode</label>
          <div class="episode-picker">
            <select id="toolbarEpisodeSelect"></select>
            <button id="prevEpisode" data-i18n="prevEpisode">上一集</button>
            <button id="nextEpisode" data-i18n="nextEpisode">下一集</button>
            <button id="enqueueEpisode" class="primary" data-i18n="enqueueEpisode">加入任务列表</button>
          </div>
        </div>
        <div class="toolbar-group">
          <label data-i18n="activeLabel">当前点选类别</label>
          <div id="activeLabelButtons" class="label-buttons"></div>
        </div>
        <div class="toolbar-group tools-group">
          <label data-i18n="tools">绘制工具</label>
          <div class="segmented toolbar-segmented">
            <button class="tool" data-tool="point" data-i18n="point">点</button>
            <button class="tool active" data-tool="box" data-i18n="box">框</button>
            <button class="tool" data-tool="paint" data-i18n="paint">画笔</button>
            <button class="tool" data-tool="erase" data-i18n="erase">橡皮</button>
          </div>
        </div>
        <button id="clearCurrent" data-i18n="clearCurrent">清除当前点</button>
        <div class="point-nav">
          <button id="prevPromptPoint" data-i18n="prevPrompt">上一个点</button>
          <button id="nextPromptPoint" data-i18n="nextPrompt">下一个点</button>
        </div>
      </section>
      <section class="workspace-section">
        <header class="section-header">
          <h1>Result</h1>
        </header>
        <div class="view-grid" id="resultGrid"></div>
      </section>
    </main>

    <template id="viewTemplate">
      <article class="view-panel">
        <header>
          <h2></h2>
          <div class="view-actions">
            <button class="preview-view" data-i18n="preview">预览</button>
            <button class="predict-view" data-i18n="predict">推理</button>
            <button class="overlay-view" data-i18n="result">结果</button>
          </div>
        </header>
        <div class="stage">
          <img class="frame" alt="" />
          <img class="overlay" alt="" />
          <canvas class="draw"></canvas>
          <canvas class="mask"></canvas>
        </div>
        <footer>
          <div class="view-controls">
            <input class="frame-slider" type="range" min="0" max="0" value="0" />
            <input class="frame-number" type="number" min="0" value="0" />
          </div>
          <div class="view-meta">
            <span class="meta"></span>
            <span class="points"></span>
            <span class="queue-state"></span>
          </div>
        </footer>
      </article>
    </template>

    <script src="/static/app.js?v=32"></script>
  </body>
</html>
